name: projectfollowup.dev

services:  
  keycloak-storage.projectfollowup.dev:
    container_name: keycloak-storage.projectfollowup.dev
    hostname: keycloak-storage.projectfollowup.dev
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=secret-password
      - MYSQL_DATABASE=keycloak
      - MYSQL_USER=keycloak
      - MYSQL_PASSWORD=keycloak-password
    volumes:
      - type: volume
        source: keycloak-data
        target: /var/lib/mysql
    networks:
      - keycloak-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "keycloak", "-pkeycloak-password"]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 30s

  keycloak.projectfollowup.dev:
    container_name: keycloak.projectfollowup.dev
    hostname: keycloak.projectfollowup.dev
    image: quay.io/keycloak/keycloak:26.5
    command:
      - start
      - --hostname=http://localhost:4001
      - --hostname-strict=false
      - --proxy-headers=xforwarded
      # - --optimized
    ports:
      - "4001:8080"
    depends_on:
      keycloak-storage.projectfollowup.dev:
        condition: service_healthy
        restart: true
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: true
      KC_HOSTNAME_STRICT: false
      DB_URL_HOST: keycloak-storage.projectfollowup.dev
      DB_URL_PROPERTIES: '?autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true'
      DB_SCHEMA: keycloak
      DB_USERNAME: keycloak
      DB_PASSWORD: 'keycloak-password'
    restart: always
    networks:
      - keycloak-network

networks:
  keycloak-network:
    driver: bridge

volumes:
  keycloak-data:
